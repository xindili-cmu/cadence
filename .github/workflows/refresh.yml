name: PT News Refresh

on:
  schedule:
    # Daily FULL sweep (Exa + PubMed + RSS) at 21:30 UTC (= 05:30 Beijing).
    # Mainland-first rhythm: the site's 今日信号 and the WeChat brief are fresh
    # before the Chinese morning peak, and the XHS digest cron (22:40 UTC =
    # 06:40 Beijing, xhs-digest.yml) runs right after this sweep. The US/UK
    # publishing day is long over by 21:30 UTC, so nothing is missed vs the
    # old 07:00 UTC slot.
    - cron: '30 21 * * *'
    # AIHOT-style high-frequency polling: PubMed + RSS only (the free legs),
    # every 2h at :25. The script exits before the LLM call when nothing new
    # arrived, so quiet runs cost nothing and write nothing.
    - cron: '25 */2 * * *'
  workflow_dispatch:  # allow manual trigger from Actions tab
    inputs:
      mode:
        description: 'full = Exa+PubMed+RSS · direct = PubMed+RSS only'
        type: choice
        options: [full, direct]
        default: full

permissions:
  contents: write

# Prevent two cron runs from racing on the same main branch
concurrency:
  group: news-refresh
  cancel-in-progress: false

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run PT news refresh
        env:
          # Production site URL — fills the RSS channel <link> and atom:self link.
          # news-refresh.js falls back to this same domain if unset, but we set it
          # explicitly so it stays the source of truth.
          SITE_URL: https://incadencept.com
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          # LLM provider switch: set repo Variable LLM_PROVIDER=gemini (Settings →
          # Secrets and variables → Actions → Variables) + Secret GEMINI_API_KEY
          # to run on Gemini's free tier; defaults to anthropic.
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 2-hourly cron → free direct legs; daily 21:30 UTC cron and manual
          # dispatch (unless overridden) → full sweep.
          REFRESH_MODE: ${{ github.event.schedule == '25 */2 * * *' && 'direct' || github.event.inputs.mode || 'full' }}
        run: node scripts/news-refresh.js

      - name: Generate WeChat daily brief (full runs only)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH_MODE: ${{ github.event.schedule == '25 */2 * * *' && 'direct' || github.event.inputs.mode || 'full' }}
        run: node scripts/wechat-brief.js

      # Web daily edition (AIHOT-style /daily page): briefs/daily/YYYY-MM-DD.json
      # + index.json manifest. Skips itself on direct runs, same as the WeChat
      # brief. Committed by the briefs/ git-add below.
      - name: Generate web daily edition (full runs only)
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH_MODE: ${{ github.event.schedule == '25 */2 * * *' && 'direct' || github.event.inputs.mode || 'full' }}
        run: node scripts/daily-brief.js

      - name: Commit news.json (with race-safe retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          [ -f rss.xml ] && git add rss.xml || true
          [ -d briefs ] && git add briefs || true
          [ -d archive ] && git add archive || true
          [ -f scrape-ledger.json ] && git add scrape-ledger.json || true
          if git diff --staged --quiet; then
            echo "No news.json changes to commit"
            exit 0
          fi
          git commit -m "📰 PT news $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            if git push; then
              echo "✓ Push succeeded on attempt $attempt"
              exit 0
            fi
            # Race: someone pushed mid-run. news.json is regenerated daily, so
            # the freshly generated file always wins — re-commit it on top of
            # the latest remote main instead of rebasing/merging (which can
            # conflict on news.json and wedge the job).
            echo "Push rejected — re-applying news.json onto latest origin/main..."
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true
            cp news.json /tmp/news.json
            cp rss.xml /tmp/rss.xml 2>/dev/null || true
            cp scrape-ledger.json /tmp/scrape-ledger.json 2>/dev/null || true
            cp -r briefs /tmp/briefs 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/news.json news.json
            cp /tmp/rss.xml rss.xml 2>/dev/null || true
            cp /tmp/scrape-ledger.json scrape-ledger.json 2>/dev/null || true
            cp -r /tmp/briefs briefs 2>/dev/null || true
            git add news.json
            [ -f rss.xml ] && git add rss.xml || true
            [ -d briefs ] && git add briefs || true
            [ -f scrape-ledger.json ] && git add scrape-ledger.json || true
            if git diff --staged --quiet; then
              echo "Remote already has identical news.json"
              exit 0
            fi
            git commit -m "📰 PT news $(date -u +%Y-%m-%d)"
          done
          echo "✗ Push failed after 3 attempts. Manual intervention required."
          exit 1
