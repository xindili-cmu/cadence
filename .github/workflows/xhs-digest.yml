# 步频小红书日报 — daily card generation.
#
# Runs at 22:40 UTC = 06:40 Beijing the next morning, when the Beijing-time
# "yesterday" is complete and fully ingested by the 2-hourly refresh polls.
# Renders xhs/YYYY-MM-DD/{cover,01..0N}.png + caption.txt (no LLM call — all
# zh fields come from the curation cron), commits the folder, done. Cindy
# downloads the folder and posts; publishing itself stays manual.
name: XHS Daily Digest

on:
  schedule:
    - cron: '40 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Digest date (YYYY-MM-DD); empty = Beijing yesterday'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: xhs-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # No package-lock.json in this repo → npm install, not npm ci.
      # The font packages are big (~200 MB); cache keyed on package.json.
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: xhs-deps-${{ hashFiles('package.json') }}

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Generate cards
        run: node scripts/xhs-digest.js ${{ github.event.inputs.date }}

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add xhs
          if git diff --staged --quiet; then
            echo "No digest changes to commit"
            exit 0
          fi
          git commit -m "📕 XHS digest $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase || true
          done
          exit 1
