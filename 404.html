<!doctype html>
<!-- 404.html — wrangler.jsonc not_found_handling: "404-page" pointed here but
     the file never existed, so bad paths got a bare Cloudflare error with no
     way back (2026-07-15 adversarial review). Self-contained on purpose: no
     app JS, no font files — this page must render even when everything else
     is broken. -->
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>404 — Cadence 步频</title>
<meta name="theme-color" content="#FAFAF6">
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #FAFAF6; color: #1B1E23;
         font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .wrap { max-width: 520px; padding: 48px 28px; text-align: center; }
  .bars { display: inline-flex; align-items: flex-end; gap: 5px; margin-bottom: 26px; }
  .bars span { width: 9px; background: #16314F; border-radius: 2px; transform: skewX(-12deg); opacity: .9; }
  .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          font-size: 13px; letter-spacing: .22em; color: #8A8F98; margin-bottom: 10px; }
  h1 { margin: 0 0 12px; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; color: #16314F; }
  p  { margin: 0 0 26px; font-size: 15px; line-height: 1.8; color: #5A6068; }
  a.btn { display: inline-block; padding: 11px 22px; background: #16314F; color: #fff;
          border-radius: 8px; text-decoration: none; font-size: 14.5px; font-weight: 600; }
  a.btn:hover { background: #1F4066; }
  .en { margin-top: 34px; padding-top: 22px; border-top: 1px solid #E7E4DB; font-size: 13px; color: #8A8F98; line-height: 1.7; }
  .en a { color: #2A5894; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="bars" aria-hidden="true">
      <span style="height:14px"></span><span style="height:26px"></span><span style="height:40px"></span>
      <span style="height:58px"></span><span style="height:32px"></span><span style="height:18px"></span>
    </div>
    <div class="code">404 · NOT FOUND</div>
    <h1>这条路径上没有信号</h1>
    <p>你要找的页面不存在，或者已经移动。<br>今天的康复证据都在首页。</p>
    <a class="btn" href="/">回到步频首页</a>
    <div class="en">This page doesn’t exist or has moved.<br><a href="/?lang=en">Back to Cadence (English edition)</a></div>
  </main>
</body>
</html>
