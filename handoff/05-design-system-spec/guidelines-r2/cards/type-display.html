<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 30px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
  .big { font-family: var(--font-display); font-weight: 600; font-size: 40px; line-height: 1.12; letter-spacing: -0.015em; color: var(--text-primary); margin: 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 14px; }
</style>
</head>
<body>
  <div class="ey">Spectral · 400–700 + italic</div>
  <p class="big">The signal that changes<br>practice this week</p>
  <p class="meta">Spectral Semibold 600 · tracking −0.015em · story titles &amp; section heads</p>
</body>
</html>
