<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 30px; font-family: var(--font-sans); }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 16px; }
  .r { display: flex; align-items: baseline; gap: 14px; margin-bottom: 10px; }
  .w { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); width: 92px; }
  .demo { font-size: 18px; color: var(--ink-800); }
</style>
</head>
<body>
  <div class="ey">IBM Plex Sans · 400–700 + Noto Sans SC</div>
  <div class="r"><span class="w">Regular 400</span><span class="demo" style="font-weight:400">Full firehose across every source · 报销政策更新</span></div>
  <div class="r"><span class="w">Medium 500</span><span class="demo" style="font-weight:500">Curated · AI-selected PT signal, updated daily</span></div>
  <div class="r"><span class="w">Semibold 600</span><span class="demo" style="font-weight:600">Orthopedic · Neurological · Sports</span></div>
  <div class="r"><span class="w">Bold 700</span><span class="demo" style="font-weight:700">Cadence — PT · Rehab · Evidence</span></div>
</body>
</html>
