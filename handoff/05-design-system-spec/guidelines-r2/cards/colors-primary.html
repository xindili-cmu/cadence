<!-- @dsCard group="Colors" viewport="700x190" name="Primary — Scrubs Blue" subtitle="Brand primary #3D74B8. Note: review vs brief's 'no hospital blue' exclusion" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-mono); padding: 24px; }
  .row { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 118px; display: flex; flex-direction: column; justify-content: flex-end; padding: 9px; }
  .sw span { font-size: 10px; letter-spacing: .02em; }
  .sw .hex { font-size: 11px; font-weight: 500; }
  .dark span { color: rgba(255,255,255,.92); }
  .light span { color: var(--ink-800); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background:var(--blue-900)"><span>900</span><span class="hex">#183354</span></div>
    <div class="sw dark" style="background:var(--blue-700)"><span>700 · hover</span><span class="hex">#2C5A96</span></div>
    <div class="sw dark" style="background:var(--blue-600)"><span>600 · PRIMARY</span><span class="hex">#3D74B8</span></div>
    <div class="sw dark" style="background:var(--blue-500)"><span>500</span><span class="hex">#4A82BE</span></div>
    <div class="sw light" style="background:var(--blue-200)"><span>200</span><span class="hex">#C5DBF0</span></div>
    <div class="sw light" style="background:var(--blue-50)"><span>50 · soft</span><span class="hex">#F2F7FC</span></div>
  </div>
</body>
</html>
