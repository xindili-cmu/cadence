<!-- @dsCard group="Type" viewport="700x230" name="Bilingual — EN title + 中文 reason" subtitle="How a story reads: English title, Chinese 'why it matters'" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 30px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--cat-neuro); margin-bottom: 12px; }
  .en { font-family: var(--font-display); font-weight: 600; font-size: 24px; line-height: 1.25; letter-spacing: -0.01em; color: var(--text-primary); margin: 0 0 14px; }
  .why { display: flex; gap: 9px; padding: 11px 13px; background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: var(--radius-md); }
  .why .lab { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--blue-700); margin-bottom: 3px; }
  .why .cn { font-family: 'Noto Sans SC', var(--font-sans); font-size: 14px; line-height: 1.6; color: var(--ink-700); }
</style>
</head>
<body>
  <div class="ey">Neurological</div>
  <p class="en">Exercise for falls prevention in Parkinson disease: a randomized controlled trial</p>
  <div class="why">
    <div>
      <div class="lab">Why it matters</div>
      <div class="cn">跌倒预防是帕金森康复的重要目标，这项研究为你的临床实践提供了高证据等级的干预策略，告诉你哪些因素是有效的干预靶点。</div>
    </div>
  </div>
</body>
</html>
