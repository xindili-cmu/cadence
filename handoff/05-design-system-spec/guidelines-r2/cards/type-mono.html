<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 26px 30px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 16px; }
  .data { font-family: var(--font-mono); font-size: 15px; line-height: 1.95; color: var(--ink-800); font-variant-numeric: tabular-nums; }
  .k { color: var(--text-tertiary); }
  .sig { color: var(--blue-700); font-weight: 600; }
</style>
</head>
<body>
  <div class="ey">IBM Plex Mono · 400 / 500 / 600</div>
  <div class="data">
    <div><span class="sig">SIGNAL 92</span> &nbsp; <span class="k">03:55 · Jun 5</span> &nbsp; <span class="k">JOSPT · AU</span></div>
    <div><span class="k">jospt.org</span> · 2026-06-05 · <span class="k">n=231</span></div>
    <div><span class="k">PT · REHAB · EVIDENCE</span></div>
  </div>
</body>
</html>
