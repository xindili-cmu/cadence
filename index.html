<!-- Language + canonical + hreflang.
     Runs before the app bundle. Language resolution MUST mirror CD_LANG in
     design-system/app (?lang param → localStorage cd-lang → navigator.language),
     so the <html lang> attribute matches the content the app renders on first
     paint — previously it stayed "en" until the user clicked the toggle.
     Canonical strips ?lang (language variants are alternates, not duplicates)
     but keeps ?item= so each story permalink canonicalizes to itself. -->
<script>
(function () {
  var lang;
  try { var q = new URLSearchParams(location.search).get('lang'); if (q === 'en' || q === 'zh') lang = q; } catch (e) {}
  if (!lang) { try { var s = localStorage.getItem('cd-lang'); if (s === 'en' || s === 'zh') lang = s; } catch (e) {} }
  if (!lang) lang = (navigator.language || '').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en';
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

  var origin = 'https://incadencept.com';
  var item;
  try { item = new URLSearchParams(location.search).get('item'); } catch (e) {}
  var path = item ? '/?item=' + encodeURIComponent(item) : '/';

  function link(rel, href, hreflang) {
    var l = document.createElement('link');
    l.rel = rel; l.href = href;
    if (hreflang) l.hreflang = hreflang;
    document.head.appendChild(l);
  }
  link('canonical', origin + path);
  var sep = item ? '&' : '?';
  link('alternate', origin + path + sep + 'lang=zh', 'zh-CN');
  link('alternate', origin + path + sep + 'lang=en', 'en');
  link('alternate', origin + path, 'x-default');
})();
</script>

<!-- Structured data (JSON-LD). Organization + WebSite — the main SEO signal a
     client-rendered SPA can hand a crawler from the static shell. No SearchAction:
     site search is hash-based client-side, so there is no real result-URL template
     for Google's sitelinks searchbox to target. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://incadencept.com/#organization",
      "name": "Cadence 步频",
      "url": "https://incadencept.com/",
      "logo": "https://incadencept.com/design-system/assets/logo-mark.svg",
      "description": "Daily curated physical therapy & rehab research for clinicians. AI-scored signal from JOSPT, PTJ, PubMed and 50 sources."
    },
    {
      "@type": "WebSite",
      "@id": "https://incadencept.com/#website",
      "url": "https://incadencept.com/",
      "name": "Cadence 步频",
      "description": "Daily curated physical therapy & rehab research for clinicians, in English and 中文.",
      "publisher": { "@id": "https://incadencept.com/#organization" },
      "inLanguage": ["en", "zh-CN"]
    }
  ]
}
</script>

<script>
  // Fallback boot — only runs if app.min.js fails to load (e.g. CI hasn't
  // generated it yet on a fresh branch). Loads Babel-standalone and compiles
  // the four JSX sources in-browser, in the same order and with the same
  // per-file scoping (indirect eval) as the old <script type="text/babel"> setup.
  window.__cdLegacyBoot = function () {
    console.warn('[Cadence] app.min.js unavailable — falling back to in-browser Babel compile');
    var b = document.createElement('script');
    b.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
    b.crossOrigin = 'anonymous';
    b.onload = async function () {
      var files = [
        'design-system/app/components.bundle.jsx', // window.NewsCard, CategoryTabs, …
        'design-system/app/app.data.jsx',          // fetch news.json → window.CD_* + CD_DATA_READY
        'design-system/app/app.shell.jsx',         // window.AppHeader, NavRail, DigestRail
        'design-system/app/app.main.jsx',          // FeedApp + ReactDOM render
      ];
      for (var i = 0; i < files.length; i++) {
        var src = await (await fetch(files[i], { cache: 'no-store' })).text();
        var code = Babel.transform(src, { presets: ['react'], filename: files[i] }).code;
        (0, eval)(code + '\n//# sourceURL=' + files[i]);
      }
    };
    document.head.appendChild(b);
  };
</script>
<script src="design-system/app/app.min.js" onerror="__cdLegacyBoot()"></script>
