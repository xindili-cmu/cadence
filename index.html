<!-- Cadence — public physical therapy news feed.
     Shell is the designer-shipped UI kit; data wiring fetches news.json on load. -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Cadence — Keeping pace with the evidence</title>

<!-- SEO / share cards. og:url + og:image need the production domain —
     fill in once the Cloudflare hostname is locked. -->
<meta name="description" content="Cadence (步频) — daily curated physical therapy & rehab research for clinicians. AI-scored signal from JOSPT, PTJ, PubMed and 20+ journals across orthopedic, neuro, sports, pediatric and geriatric PT.">
<meta name="theme-color" content="#FAFAF6">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Cadence 步频">
<meta property="og:title" content="Cadence — Keeping pace with the evidence">
<meta property="og:description" content="Daily curated physical therapy & rehab research for clinicians. AI-scored signal from JOSPT, PTJ, PubMed and 20+ journals.">
<!-- TODO once domain is live: <meta property="og:url" content="https://…"> and <meta property="og:image" content="https://…/og-card.png"> -->
<meta name="twitter:card" content="summary">

<!-- Brand / fonts / design tokens -->
<link rel="icon" href="design-system/assets/logo-mark.svg">
<link rel="stylesheet" href="design-system/styles.css">

<!-- Production React + precompiled app bundle (fast path — no Babel, no runtime
     JSX compile). app.min.js is generated from design-system/app/*.jsx by
     scripts/build-app.js (run by .github/workflows/build-app.yml on push, or
     locally via `npm run build-app`). -->
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; background: var(--surface-page); }
  * { box-sizing: border-box; }
  ::selection { background: var(--green-200); }
</style>
</head>
<body>
<div id="root">
  <!-- Pre-hydration skeleton in design-system tokens so first paint matches the brand -->
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAFAF6;color:#6A766D;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13px;letter-spacing:0.02em">
    Loading Cadence…
  </div>
</div>

<script>
  // Fallback boot — only runs if app.min.js fails to load (e.g. CI hasn't
  // generated it yet on a fresh branch). Loads Babel-standalone and compiles
  // the four JSX sources in-browser, in the same order and with the same
  // per-file scoping (indirect eval) as the old <script type="text/babel"> setup.
  window.__cdLegacyBoot = function () {
    console.warn('[Cadence] app.min.js unavailable — falling back to in-browser Babel compile');
    var b = document.createElement('script');
    b.src = 'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js';
    b.crossOrigin = 'anonymous';
    b.onload = async function () {
      var files = [
        'design-system/app/components.bundle.jsx', // window.NewsCard, CategoryTabs, …
        'design-system/app/app.data.jsx',          // fetch news.json → window.CD_* + CD_DATA_READY
        'design-system/app/app.shell.jsx',         // window.AppHeader, NavRail, DigestRail
        'design-system/app/app.main.jsx',          // FeedApp + ReactDOM render
      ];
      for (var i = 0; i < files.length; i++) {
        var src = await (await fetch(files[i], { cache: 'no-store' })).text();
        var code = Babel.transform(src, { presets: ['react'], filename: files[i] }).code;
        (0, eval)(code + '\n//# sourceURL=' + files[i]);
      }
    };
    document.head.appendChild(b);
  };
</script>
<script src="design-system/app/app.min.js" onerror="__cdLegacyBoot()"></script>
</body>
</html>
